<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แนวรับแนวต้าน</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d0d0d;color:#e0e0e0;min-height:100vh}

/* TICKER TAPE */
.tape-wrap{border-bottom:1px solid #1e1e1e}

/* TOPBAR */
.topbar{background:#111;border-bottom:1px solid #222;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar .title{font-size:1rem;font-weight:700;color:#fff}
.topbar .badge{background:#3b82f6;color:#fff;font-size:0.68rem;font-weight:700;padding:2px 9px;border-radius:20px}
.stock-select-wrap{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.stock-select-wrap label{font-size:0.78rem;color:#888}
select{background:#1a1a1a;border:1px solid #2a2a2a;color:#e0e0e0;padding:6px 10px;border-radius:8px;font-size:0.8rem;outline:none;cursor:pointer}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:1fr 420px;gap:0;height:calc(100vh - 90px)}

/* LEFT: TRADINGVIEW CHART */
.chart-pane{position:relative;border-right:1px solid #1e1e1e}
.chart-pane iframe,.tv-widget{width:100%;height:100%;border:none}

/* RIGHT PANEL */
.right-panel{overflow-y:auto;background:#0f0f0f;display:flex;flex-direction:column;gap:0}

/* PRICE HEADER */
.price-header{background:#141414;border-bottom:1px solid #222;padding:16px 20px}
.price-ticker{font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:1px}
.price-current{font-size:2rem;font-weight:700;color:#fff;margin:4px 0}
.price-change{font-size:0.85rem;font-weight:600}
.pos{color:#22c55e}.neg{color:#ef4444}

/* SECTIONS */
.panel-section{border-bottom:1px solid #1e1e1e;padding:16px 20px}
.panel-title{font-size:0.78rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* SR INPUT */
.sr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sr-group{display:flex;flex-direction:column;gap:3px}
.sr-group label{font-size:0.68rem;color:#666;font-weight:600}
.sr-input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:6px 8px;color:#e0e0e0;font-size:0.8rem;outline:none;text-align:right;width:100%}
.sr-input:focus{border-color:#3b82f6}
.sr-input.r-field{border-left:2px solid #ef4444}
.sr-input.s-field{border-left:2px solid #22c55e}
.entry-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.entry-row label{font-size:0.78rem;color:#ccc;white-space:nowrap}
.entry-input{background:#1a1a1a;border:1px solid #3b82f6;border-radius:6px;padding:7px 10px;color:#fff;font-size:0.88rem;outline:none;text-align:right;width:130px;font-weight:600}
.invest-row{display:flex;align-items:center;gap:8px}
.invest-row label{font-size:0.78rem;color:#888}
.invest-input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:6px 10px;color:#e0e0e0;font-size:0.8rem;outline:none;text-align:right;width:100px}
.calc-btn{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:0.82rem;font-weight:700;cursor:pointer;margin-top:10px;width:100%;transition:.15s}
.calc-btn:hover{background:#2563eb}

/* SR TABLE */
.sr-table-wrap{padding:16px 20px;flex:1}
table{width:100%;border-collapse:collapse;font-size:0.78rem}
thead th{background:#111;color:#555;padding:8px 10px;text-align:center;border-bottom:1px solid #222;white-space:nowrap;font-weight:600}
thead th.left{text-align:left}
tbody tr{border-bottom:1px solid #1c1c1c}
tbody tr:hover{background:#161616}
td{padding:8px 10px;text-align:center;white-space:nowrap}
td.left{text-align:left;font-weight:700}
.r-header{color:#ef4444!important}
.s-label{color:#22c55e;font-size:0.78rem;font-weight:700}
.s-price{color:#aaa;font-size:0.72rem;display:block}
.gain-cell{line-height:1.3}
.gain-usd{font-weight:600}
.gain-pct{font-size:0.72rem}
.no-data{color:#444;text-align:center;padding:24px;font-size:0.82rem}

/* LINKS */
.links-section{padding:14px 20px;border-top:1px solid #1e1e1e;display:flex;flex-wrap:wrap;gap:8px}
.link-btn{display:inline-flex;align-items:center;gap:5px;background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;font-size:0.72rem;padding:5px 12px;border-radius:20px;text-decoration:none;transition:.15s}
.link-btn:hover{background:#222;color:#fff;border-color:#444}

@media(max-width:900px){
  .main{grid-template-columns:1fr;height:auto}
  .chart-pane{height:380px}
}
</style>
</head>
<body>

<!-- TICKER TAPE -->
<div class="tape-wrap">
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {
      "symbols": [
        {"proName":"NASDAQ:NVDA","title":"NVDA"},
        {"proName":"NASDAQ:RKLB","title":"RKLB"},
        {"proName":"NASDAQ:META","title":"META"},
        {"proName":"NASDAQ:AVGO","title":"AVGO"},
        {"proName":"NYSE:TSM","title":"TSM"},
        {"proName":"NYSE:LLY","title":"LLY"},
        {"proName":"NYSE:NVO","title":"NVO"},
        {"proName":"NASDAQ:MELI","title":"MELI"},
        {"proName":"NASDAQ:NVDA","title":"SPY"},
        {"proName":"NASDAQ:QQQ","title":"QQQ"}
      ],
      "showSymbolLogo": true,
      "colorTheme": "dark",
      "isTransparent": true,
      "displayMode": "adaptive",
      "locale": "en"
    }
    </script>
  </div>
</div>

<div class="topbar">
  <div class="title">📐 แนวรับแนวต้าน</div>
  <span class="badge">Real-time</span>
  <div class="stock-select-wrap">
    <label>เลือกหุ้น:</label>
    <select id="stockSel" onchange="onStockChange()">
      <option value="NASDAQ:NVDA" data-ticker="NVDA">NVDA — Nvidia</option>
      <option value="NASDAQ:RKLB" data-ticker="RKLB">RKLB — Rocket Lab</option>
      <option value="NASDAQ:META" data-ticker="META">META — Meta</option>
      <option value="NASDAQ:AVGO" data-ticker="AVGO">AVGO — Broadcom</option>
      <option value="NYSE:TSM"    data-ticker="TSM">TSM — TSMC</option>
      <option value="NYSE:LLY"    data-ticker="LLY">LLY — Eli Lilly</option>
      <option value="NYSE:NVO"    data-ticker="NVO">NVO — Novo Nordisk</option>
      <option value="NASDAQ:MELI" data-ticker="MELI">MELI — MercadoLibre</option>
    </select>
  </div>
</div>

<div class="main">
  <!-- LEFT: TradingView Chart -->
  <div class="chart-pane">
    <div class="tradingview-widget-container" style="height:100%">
      <div id="tv_chart" style="height:100%"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
      <script type="text/javascript">
      var tvWidget = new TradingView.widget({
        autosize: true,
        symbol: "NASDAQ:NVDA",
        interval: "D",
        timezone: "Asia/Bangkok",
        theme: "dark",
        style: "1",
        locale: "th",
        toolbar_bg: "#111",
        enable_publishing: false,
        allow_symbol_change: false,
        hide_side_toolbar: false,
        studies: ["BB@tv-basicstudies","MASimple@tv-basicstudies"],
        container_id: "tv_chart"
      });
      </script>
    </div>
  </div>

  <!-- RIGHT: Controls + SR Table -->
  <div class="right-panel">
    <!-- PRICE HEADER -->
    <div class="price-header">
      <div class="price-ticker" id="phTicker">NVDA</div>
      <div style="color:#666;font-size:0.78rem;margin-top:2px">กรอก S/R แล้วกด คำนวณ</div>
    </div>

    <!-- INPUT SECTION -->
    <div class="panel-section">
      <div class="panel-title">ราคา Entry &amp; เงินลงทุน</div>
      <div class="entry-row">
        <label>ราคา Entry ($):</label>
        <input class="entry-input" type="number" id="entryPrice" placeholder="0.00" step="0.01" oninput="calcTable()">
        <div class="invest-row" style="margin:0">
          <label>เงินลงทุน $</label>
          <input class="invest-input" type="number" id="investAmt" value="1000" step="100" oninput="calcTable()">
        </div>
      </div>

      <div class="panel-title" style="margin-top:10px">แนวต้าน (Resistance)</div>
      <div class="sr-grid">
        <div class="sr-group"><label>R1</label><input class="sr-input r-field" type="number" id="R1" placeholder="—" step="0.01" oninput="calcTable()"></div>
        <div class="sr-group"><label>R2</label><input class="sr-input r-field" type="number" id="R2" placeholder="—" step="0.01" oninput="calcTable()"></div>
        <div class="sr-group"><label>R3</label><input class="sr-input r-field" type="number" id="R3" placeholder="—" step="0.01" oninput="calcTable()"></div>
      </div>

      <div class="panel-title" style="margin-top:10px">แนวรับ (Support)</div>
      <div class="sr-grid">
        <div class="sr-group"><label>S1</label><input class="sr-input s-field" type="number" id="S1" placeholder="—" step="0.01" oninput="calcTable()"></div>
        <div class="sr-group"><label>S2</label><input class="sr-input s-field" type="number" id="S2" placeholder="—" step="0.01" oninput="calcTable()"></div>
        <div class="sr-group"><label>S3</label><input class="sr-input s-field" type="number" id="S3" placeholder="—" step="0.01" oninput="calcTable()"></div>
        <div class="sr-group"><label>S4</label><input class="sr-input s-field" type="number" id="S4" placeholder="—" step="0.01" oninput="calcTable()"></div>
        <div></div><div></div>
      </div>
    </div>

    <!-- SR CALCULATION TABLE -->
    <div class="sr-table-wrap">
      <div class="panel-title">ตารางคำนวณ แนวรับ → แนวต้าน</div>
      <div id="srTableWrap"><div class="no-data">กรอกราคา S/R แล้วผลลัพธ์จะแสดงอัตโนมัติ</div></div>
    </div>

    <!-- LINKS -->
    <div class="links-section" id="linkSection"></div>
  </div>
</div>

<script>
// ===== DATA: แก้ไข S/R ของแต่ละหุ้นที่นี่ หรือให้ skill อัปเดต =====
const stockData = {
  "NASDAQ:NVDA": { ticker:"NVDA", entry:0, invest:1000, R1:0,R2:0,R3:0, S1:0,S2:0,S3:0,S4:0 },
  "NASDAQ:RKLB": { ticker:"RKLB", entry:0, invest:1000, R1:0,R2:0,R3:0, S1:0,S2:0,S3:0,S4:0 },
  "NASDAQ:META": { ticker:"META", entry:0, invest:1000, R1:0,R2:0,R3:0, S1:0,S2:0,S3:0,S4:0 },
  "NASDAQ:AVGO": { ticker:"AVGO", entry:0, invest:1000, R1:0,R2:0,R3:0, S1:0,S2:0,S3:0,S4:0 },
  "NYSE:TSM":    { ticker:"TSM",  entry:0, invest:1000, R1:0,R2:0,R3:0, S1:0,S2:0,S3:0,S4:0 },
  "NYSE:LLY":    { ticker:"LLY",  entry:0, invest:1000, R1:0,R2:0,R3:0, S1:0,S2:0,S3:0,S4:0 },
  "NYSE:NVO":    { ticker:"NVO",  entry:0, invest:1000, R1:0,R2:0,R3:0, S1:0,S2:0,S3:0,S4:0 },
  "NASDAQ:MELI": { ticker:"MELI", entry:2300, invest:1000,
                   R1:2101.93, R2:2220.02, R3:2329.89,
                   S1:1927.94, S2:1883.04, S3:1750.88, S4:1602.40 },
};
// =====================================================================

function fmt(n,d=2){ return n==null||isNaN(n)?"—":n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); }

function loadStock(sym){
  const d=stockData[sym]||{};
  document.getElementById("phTicker").textContent=d.ticker||sym;
  document.getElementById("entryPrice").value=d.entry||"";
  document.getElementById("investAmt").value=d.invest||1000;
  ["R1","R2","R3","S1","S2","S3","S4"].forEach(k=>{
    const v=d[k]; document.getElementById(k).value=v&&v!==0?v:"";
  });
  // Update links
  const links=[
    {label:"📈 TradingView",url:`https://www.tradingview.com/chart/?symbol=${sym}`},
    {label:"📊 Yahoo Finance",url:`https://finance.yahoo.com/quote/${d.ticker}`},
    {label:"🔍 Finviz",url:`https://finviz.com/quote.ashx?t=${d.ticker}`},
  ];
  document.getElementById("linkSection").innerHTML=links.map(l=>
    `<a class="link-btn" href="${l.url}" target="_blank">${l.label}</a>`
  ).join("");
  calcTable();
}

function onStockChange(){
  const sel=document.getElementById("stockSel");
  const sym=sel.value;
  // Update TradingView chart
  if(typeof tvWidget!=="undefined"&&tvWidget.setSymbol){
    tvWidget.setSymbol(sym,"D",()=>{});
  }
  loadStock(sym);
}

function calcTable(){
  const entry=parseFloat(document.getElementById("entryPrice").value)||0;
  const invest=parseFloat(document.getElementById("investAmt").value)||1000;
  const Rs=["R1","R2","R3"].map(k=>parseFloat(document.getElementById(k).value)||null).filter(Boolean);
  const Ss=["S1","S2","S3","S4"].map(k=>({
    key:k, val:parseFloat(document.getElementById(k).value)||null
  })).filter(s=>s.val);

  const wrap=document.getElementById("srTableWrap");
  if(!Rs.length&&!Ss.length){
    wrap.innerHTML=`<div class="no-data">กรอกราคา S/R แล้วผลลัพธ์จะแสดงอัตโนมัติ</div>`;
    return;
  }

  const rHeaders=["R1","R2","R3"].slice(0,Rs.length);
  let html=`<table><thead><tr>
    <th class="left" style="color:#888">ซื้อที่</th>`;
  rHeaders.forEach((rk,i)=>html+=`<th class="r-header">${rk}<br><span style="font-weight:400;font-size:0.7rem">$${fmt(Rs[i])}</span></th>`);
  html+=`</tr></thead><tbody>`;

  // Entry row if provided
  if(entry>0){
    html+=`<tr><td class="left"><span style="color:#3b82f6;font-weight:700">Entry</span><span class="s-price">$${fmt(entry)}</span></td>`;
    Rs.forEach(r=>{
      const pct=(r-entry)/entry*100;
      const usd=(r-entry)/entry*invest;
      const pc=pct>=0?"pos":"neg";
      const sg=pct>=0?"+":"";
      html+=`<td class="gain-cell"><div class="gain-usd ${pc}">${sg}$${fmt(Math.abs(usd))}</div><div class="gain-pct ${pc}">${sg}${fmt(pct)}%</div></td>`;
    });
    html+=`</tr>`;
  }

  Ss.forEach(s=>{
    html+=`<tr><td class="left"><span class="s-label">${s.key}</span><span class="s-price">$${fmt(s.val)}</span></td>`;
    Rs.forEach(r=>{
      const pct=(r-s.val)/s.val*100;
      const usd=(r-s.val)/s.val*invest;
      const pc=pct>=0?"pos":"neg";
      const sg=pct>=0?"+":"";
      html+=`<td class="gain-cell"><div class="gain-usd ${pc}">${sg}$${fmt(Math.abs(usd))}</div><div class="gain-pct ${pc}">${sg}${fmt(pct)}%</div></td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table>`;
  wrap.innerHTML=html;
}

// Init with first stock
loadStock("NASDAQ:NVDA");
</script>
</body>
</html>
